<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnidesq Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --border:   #2a2a2a;
      --gold:     #C9A84C;
      --gold-dim: #a0832c;
      --white:    #f0f0f0;
      --muted:    #888;
      --green:    #2ecc71;
      --blue:     #3498db;
      --red:      #e74c3c;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 6px;
    }

    .login-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }

    .field-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }

    .field-input:focus { border-color: var(--gold); }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .login-btn:hover { background: var(--gold-dim); }

    .login-error {
      color: var(--red);
      font-size: 0.82rem;
      margin-top: 12px;
      text-align: center;
      display: none;
    }

    /* ── PORTAL ── */
    #portal { display: none; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: baseline; gap: 14px; }
    .logo { font-size: 1.4rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; }
    .header-account { font-size: 0.85rem; color: var(--muted); }
    .header-account span { color: var(--white); font-weight: 600; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .live-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.75rem; font-weight: 600;
      color: var(--green);
      background: rgba(46,204,113,0.1);
      border: 1px solid rgba(46,204,113,0.25);
      border-radius: 20px;
      padding: 5px 12px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .logout-btn:hover { color: var(--white); border-color: var(--white); }

    main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }

    /* ── TABS ── */
    .tab-bar {
      display: flex; gap: 4px;
      margin-bottom: 36px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 11px 22px;
      background: none; border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── SECTION ── */
    .section-title {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
      padding-bottom: 10px; border-bottom: 1px solid var(--border);
    }

    section { margin-bottom: 44px; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px; margin-bottom: 40px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px; text-align: center;
    }

    .stat-val { font-size: 2rem; font-weight: 700; color: var(--gold); letter-spacing: -0.02em; }
    .stat-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
    .stat-sub { font-size: 0.7rem; color: var(--green); margin-top: 4px; }

    /* ── AGENT CARDS ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
    }

    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      transition: border-color 0.2s;
    }

    .agent-card:hover { border-color: var(--gold); }

    .ac-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .ac-name { font-size: 0.95rem; font-weight: 600; }

    .badge { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; }
    .badge-live { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.28); }
    .badge-trial { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.28); }
    .badge-pending { background: rgba(100,100,100,0.2); color: #aaa; border: 1px solid #444; }
    .badge-demo { background: rgba(52,152,219,0.12); color: var(--blue); border: 1px solid rgba(52,152,219,0.28); }

    .ac-agent { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
    .ac-agent span { color: var(--white); }
    .ac-phone a { font-size: 0.92rem; color: var(--gold); text-decoration: none; font-weight: 500; }
    .ac-phone a:hover { text-decoration: underline; }
    .ac-notes { margin-top: 10px; font-size: 0.75rem; color: var(--muted); border-top: 1px solid var(--border); padding-top: 9px; }

    /* ── PIPELINE ── */
    .pipeline-list { display: flex; flex-direction: column; gap: 10px; }

    .pipeline-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 15px 18px;
      display: flex; align-items: flex-start; gap: 14px;
    }

    .p-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); margin-top: 6px; flex-shrink: 0; }
    .p-name { font-weight: 600; font-size: 0.88rem; margin-bottom: 2px; }
    .p-detail { font-size: 0.78rem; color: var(--muted); }
    .p-value { margin-left: auto; font-size: 0.8rem; font-weight: 600; color: var(--gold); white-space: nowrap; flex-shrink: 0; }

    /* ── ACTION ITEMS ── */
    .action-list { display: flex; flex-direction: column; gap: 10px; }

    .action-item {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 8px;
      padding: 13px 18px; display: flex; align-items: center; gap: 14px; font-size: 0.84rem;
    }

    .ai-label { font-weight: 600; color: var(--white); min-width: 150px; }
    .ai-detail { color: var(--muted); }

    /* ── CALLS ── */
    .calls-list { display: flex; flex-direction: column; gap: 10px; }

    .call-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px;
      display: flex; align-items: center; gap: 12px;
    }

    .call-info { flex: 1; }
    .call-name { font-size: 0.88rem; font-weight: 600; }
    .call-detail { font-size: 0.76rem; color: var(--muted); margin-top: 2px; }
    .call-time { font-size: 0.73rem; color: var(--muted); white-space: nowrap; }

    .cbadge { font-size: 0.65rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
    .cbadge-booked { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.25); }
    .cbadge-message { background: rgba(52,152,219,0.12); color: var(--blue); border: 1px solid rgba(52,152,219,0.25); }

    /* ── APPTS ── */
    .appt-list { display: flex; flex-direction: column; gap: 10px; }

    .appt-item {
      background: var(--surface); border: 1px solid var(--border);
      border-left: 3px solid var(--gold); border-radius: 10px;
      padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; gap: 14px;
    }

    .appt-name { font-size: 0.88rem; font-weight: 600; }
    .appt-service { font-size: 0.76rem; color: var(--muted); margin-top: 2px; }
    .appt-time { font-size: 0.78rem; color: var(--gold); font-weight: 600; white-space: nowrap; text-align: right; }

    /* ── AGENT HERO ── */
    .agent-hero {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 24px;
      display: flex; align-items: center; gap: 22px;
    }

    .agent-avatar {
      width: 58px; height: 58px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }

    .agent-hero h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
    .agent-hero p { font-size: 0.83rem; color: var(--muted); margin-bottom: 8px; }
    .agent-phone { font-size: 0.95rem; font-weight: 600; color: var(--gold); text-decoration: none; }
    .agent-phone:hover { text-decoration: underline; }

    /* ── LINKS ── */
    .links-grid { display: flex; flex-wrap: wrap; gap: 10px; }

    .quick-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--white); text-decoration: none;
      font-size: 0.82rem; font-weight: 500;
      transition: border-color 0.2s, color 0.2s;
    }

    .quick-link:hover { border-color: var(--gold); color: var(--gold); }

    /* ── TWILIO BANNER ── */
    .twilio-banner {
      background: rgba(201,168,76,0.07);
      border: 1px solid rgba(201,168,76,0.3);
      border-left: 4px solid var(--gold);
      border-radius: 10px; padding: 16px 20px;
      display: flex; gap: 12px; align-items: flex-start;
    }

    .twilio-text { font-size: 0.84rem; color: #ccc; line-height: 1.6; }
    .twilio-text strong { color: var(--gold); display: block; font-size: 0.76rem; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; }

    /* ── WELCOME ── */
    .welcome { margin-bottom: 36px; }
    .welcome h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 5px; }
    .welcome p { font-size: 0.88rem; color: var(--muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 16px 20px; flex-direction: column; align-items: flex-start; gap: 12px; }
      main { padding: 24px 16px 60px; }
      .login-box { padding: 36px 24px; }
      .agent-hero { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Omnidesq</div>
    <div class="login-sub">Sign in to your portal</div>
    <label class="field-label" for="email-input">Email</label>
    <input class="field-input" type="email" id="email-input" placeholder="you@example.com" autocomplete="email" />
    <label class="field-label" for="pw-input">Password</label>
    <div style="position:relative">
      <input class="field-input" type="password" id="pw-input" placeholder="Password" autocomplete="current-password" style="width:100%;padding-right:48px" />
      <button onclick="togglePw()" type="button" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;cursor:pointer;font-size:1rem;padding:0" id="pw-eye">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error">Invalid email or password.</div>
  </div>
</div>

<!-- PORTAL -->
<div id="portal">
  <header>
    <div class="header-left">
      <div class="logo">Omnidesq</div>
      <div class="header-account" id="header-account"></div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>Live</div>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <main id="portal-main"></main>
</div>

<script>

  /* ── LOGIN ── */
  let currentUser = null;

  function doLogin() {
    const email = document.getElementById('email-input').value.trim().toLowerCase();
    const pw    = document.getElementById('pw-input').value;
    const acct  = ACCOUNTS[email];
    if (acct && acct.password === pw) {
      currentUser = { email, ...acct };
      sessionStorage.setItem('portal_user', JSON.stringify(currentUser));
      showPortal();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('portal_user');
    currentUser = null;
    document.getElementById('portal').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('pw-input').value = '';
    document.getElementById('email-input').value = '';
  }

  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function togglePw() {
    const input = document.getElementById('pw-input');
    const eye = document.getElementById('pw-eye');
    if (input.type === 'password') { input.type = 'text'; eye.textContent = '🙈'; }
    else { input.type = 'password'; eye.textContent = '👁'; }
  }
  document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pw-input').focus(); });

  /* ── RENDER ── */
  function showPortal() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('portal').style.display = 'block';
    const acct = document.getElementById('header-account');
    acct.innerHTML = currentUser.role === 'admin'
      ? `Signed in as <span>${currentUser.name} (Admin)</span>`
      : `Client: <span>${currentUser.name}</span>`;
    renderMain();
  }

  function renderMain() {
    const el = document.getElementById('portal-main');
    el.innerHTML = currentUser.role === 'admin' ? renderAdmin() : renderClient(CLIENTS[currentUser.client]);
    // activate first tab
    const firstBtn = el.querySelector('.tab-btn');
    if (firstBtn) firstBtn.click();
  }

  /* ── ADMIN VIEW ── */
  function renderAdmin() {
    return `

  /* ── TAB SWITCHING ── */
  function switchTab(name, btn) {
    const panels = document.querySelectorAll('.tab-panel');
    const btns   = document.querySelectorAll('.tab-btn');
    panels.forEach(p => p.classList.remove('active'));
    btns.forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  /* ── CONTENT GENERATOR ── */
  const RAILWAY = 'https://aria-booking-server-production.up.railway.app';

  /* ── SOCIAL CONNECT ── */
  async function connectMeta() {
    try {
      const r = await fetch(`${RAILWAY}/social/meta/auth-url`);
      const data = await r.json();
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Error: ' + (data.error || 'Could not get auth URL'));
      }
    } catch(e) {
      alert('Connection error: ' + e.message);
    }
  }

  async function loadSocialAccounts() {
    try {
      const r = await fetch(`${RAILWAY}/social/accounts`);
      const data = await r.json();
      const el = document.getElementById('social-accounts');
      if (!el) return;
      if (data.meta?.connected) {
        const pages = data.meta.pages.map(p => `<div style="padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--white);font-weight:600">${p.name}</span> ${p.igId ? '<span style="color:var(--green);font-size:0.75rem;margin-left:8px">+ Instagram</span>' : ''}</div>`).join('');
        el.innerHTML = pages || '<span style="color:var(--green)">Connected</span>';
      } else {
        el.textContent = 'Not connected yet.';
      }
    } catch { 
      const el = document.getElementById('social-accounts');
      if (el) el.textContent = 'Not connected yet.';
    }
  }

  // Load on content tab open
  document.addEventListener('DOMContentLoaded', loadSocialAccounts);

  async function generateContent() {
    const topic = document.getElementById('blog-topic').value.trim();
    if (!topic) { alert('Please enter a topic.'); return; }
    const keywords = document.getElementById('blog-keywords').value.split(',').map(k => k.trim()).filter(Boolean);
    const format = document.getElementById('video-format').value;
    const btn = document.getElementById('generate-btn');
    const status = document.getElementById('content-status');
    const result = document.getElementById('content-result');
    const videoResult = document.getElementById('video-result');

    btn.disabled = true;
    btn.textContent = 'Generating...';
    status.style.display = 'block';
    status.textContent = 'Writing blog post with Claude...';
    result.style.display = 'none';
    videoResult.style.display = 'none';

    try {
      // Blog post
      const blogRes = await fetch(`${RAILWAY}/publish-blog`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ topic, keywords })
      });
      const blog = await blogRes.json();
      if (blog.url) {
        document.getElementById('blog-url').href = blog.url;
        document.getElementById('blog-url').textContent = blog.url;
        result.style.display = 'block';
        status.textContent = 'Blog published. Rendering video...';
      } else {
        status.textContent = 'Blog error: ' + (blog.error || 'Unknown');
        btn.disabled = false; btn.textContent = 'Generate Blog Post + Video';
        return;
      }

      // Video
      const videoRes = await fetch(`${RAILWAY}/render-video`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: topic, subtitle: 'omnidesq.com', caption: '#AI #SmallBusiness #Milwaukee', format })
      });
      const video = await videoRes.json();
      if (video.renderId) {
        videoResult.style.display = 'block';
        status.textContent = 'Done. Video rendering in background.';
        // Poll for video completion
        pollVideo(video.renderId);
      }
    } catch(e) {
      status.textContent = 'Error: ' + e.message;
    }

    btn.disabled = false;
    btn.textContent = 'Generate Blog Post + Video';
  }

  async function pollVideo(id) {
    let attempts = 0;
    const interval = setInterval(async () => {
      attempts++;
      if (attempts > 20) { clearInterval(interval); return; }
      try {
        const r = await fetch(`${RAILWAY}/video-status/${id}`);
        const data = await r.json();
        if (data.status === 'done' && data.url) {
          clearInterval(interval);
          document.getElementById('video-status-text').textContent = 'Video ready!';
          document.getElementById('video-url').href = data.url;
          document.getElementById('video-url-wrap').style.display = 'block';
        } else if (data.status === 'failed') {
          clearInterval(interval);
          document.getElementById('video-status-text').textContent = 'Video render failed.';
        }
      } catch { /* ignore */ }
    }, 5000);
  }

  /* ── AUTO LOGIN FROM SESSION ── */
  const saved = sessionStorage.getItem('portal_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    showPortal();
  }
</script>
